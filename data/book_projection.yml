parts:
  - id: part1
    title: "제1부: 아키텍처"
    summary: "책의 아키텍처 파트는 내부 구현 설명을 공개 Agent SDK의 메시지 스트림, tool loop, 권한 옵션, 세션 이벤트로 재배치한다."
    highlights:
      - "`query()`와 `ClaudeSDKClient`를 실행 계약의 중심으로 둔다."
      - "도구 표면은 built-in tools, MCP tools, custom tools, permission callbacks로 설명한다."
      - "스트리밍과 인터럽트는 cookbook의 notebook 실행 흐름과 SDK message type으로 관찰한다."
  - id: part2
    title: "제2부: 프롬프트 엔지니어링"
    summary: "프롬프트 파트는 내부 시스템 프롬프트를 직접 노출하지 않고 `system_prompt`, `CLAUDE.md`, output styles, slash commands, tool descriptions로 다시 쓴다."
    highlights:
      - "행동 제어는 공개 옵션과 프로젝트 파일 설정으로 설명한다."
      - "도구 설명 품질은 cookbook의 tool use, Pydantic, tool search 예제로 검증한다."
      - "모델 튜닝과 A/B 테스트는 eval notebook과 usage/cost 관측으로 연결한다."
  - id: part3
    title: "제3부: 세션과 메시지 관측"
    summary: "컨텍스트와 세션 파트는 session browser, resume/fork, compaction, context engineering 예제로 재구성한다."
    highlights:
      - "세션은 로컬 transcript와 SDK session id를 기준으로 설명한다."
      - "압축은 구현 추정이 아니라 compaction cookbook과 prompt caching 비용 관측으로 설명한다."
      - "토큰 예산은 context engineering, prompt caching, usage/cost API로 확인한다."
  - id: part4
    title: "제4부: 프롬프트 캐싱"
    summary: "프롬프트 캐싱 파트는 Claude Code 내부 캐시 추정을 줄이고 공개 prompt caching cookbook과 비용 관측 중심으로 다시 쓴다."
    highlights:
      - "캐시 브레이크는 prompt 구성 변화와 모델/세션 경계로 설명한다."
      - "실습은 `misc/prompt_caching.ipynb`와 `misc/speculative_prompt_caching.ipynb`를 기준으로 둔다."
      - "컨텍스트 chunking은 contextual embeddings/RAG 예제로 보강한다."
  - id: part5
    title: "제5부: 안전성과 권한"
    summary: "안전성 파트는 내부 classifier가 아니라 공개 permission mode, hooks, sandbox, secure deployment, human-in-the-loop 패턴으로 번역한다."
    highlights:
      - "자동 승인과 차단은 `allowed_tools`, `disallowed_tools`, `permission_mode`, hooks로 설명한다."
      - "샌드박스와 격리는 hosting, self-hosted sandbox, managed agents 예제로 설명한다."
      - "프롬프트 인젝션은 신뢰 경계와 tool result 검증 실습으로 다룬다."
  - id: part6
    title: "제6부: 고급 서브시스템"
    summary: "고급 파트는 subagents, MCP, skills, plugins, managed agents, memory, multi-agent orchestration으로 재배치한다."
    highlights:
      - "비공개 기능 플래그 목록은 게시하지 않고 공개 릴리스/재현 조건 기록법으로 대체한다."
      - "팀 실행은 Agent SDK subagents와 Managed Agents 예제를 함께 둔다."
      - "스킬과 플러그인은 cookbook의 Skills notebooks와 공식 SDK 문서에 맞춘다."
  - id: part7
    title: "제7부: AI 에이전트 구축자를 위한 교훈"
    summary: "마지막 파트는 하니스 엔지니어링, observability, evals, production patterns, 한계와 설계 체크리스트로 정리한다."
    highlights:
      - "교훈은 실행 가능한 cookbook 패턴과 운영 예제로 접지한다."
      - "관측 가능성은 usage/cost, OpenTelemetry, notebook visualizer를 함께 연결한다."
      - "나만의 agent는 `00`에서 시작해 hosting/managed agents로 확장하는 경로를 제시한다."
  - id: appendix
    title: "부록"
    summary: "부록은 내부 파일 인덱스나 기능 플래그 원문을 공개하지 않고, 공개 cookbook에서 검증 가능한 파일, 환경 변수, 용어, 배포 청사진으로 재작성한다."
    highlights:
      - "비공개 목록은 공개 사이트에 옮기지 않는다."
      - "환경 변수와 파일 인덱스는 이 저장소의 실제 파일 기준으로 다시 쓴다."
      - "인증/구독/플러그인 청사진은 공개 docs와 examples만 연결한다."

chapters:
  - id: ch01
    part_id: part1
    number: "1장:"
    title: "AI 코딩 에이전트의 전체 기술 스택"
    source_book: "docs/book-sdk-ko/src/part1/ch01.md"
    status: public
    confidence: high
    rewrite: >
      공개판에서는 Claude Code 내부 스택을 직접 해부하는 대신 Agent SDK가 노출하는 실행 계약으로 설명한다. `query()`는 한 번의 agent run을 시작하고, `ClaudeSDKClient`는 여러 turn의 상태를 유지한다. cookbook의 research agent와 chief-of-staff agent는 이 추상화가 실제 Python 코드에서 어떻게 구성되는지 보여준다.

      핵심 관측점은 초기 system message, tool use block, tool result, result message, usage/cost metadata다. UI나 내부 runtime 명칭보다 실행 중 흘러나오는 SDK message와 cookbook의 agent 파일을 기준으로 기술 스택을 다시 읽는다.
    cookbook:
      - path: claude_agent_sdk/README.md
        title: "Agent SDK tutorial overview"
      - path: claude_agent_sdk/00_The_one_liner_research_agent.ipynb
        title: "One-liner research agent notebook"
      - path: claude_agent_sdk/research_agent/agent.py
        title: "Research agent Python implementation"
    official_docs:
      - title: "Agent SDK overview"
        url: "https://code.claude.com/docs/en/agent-sdk/overview.md"
      - title: "Agent SDK Python reference"
        url: "https://code.claude.com/docs/en/agent-sdk/python.md"
      - title: "How the agent loop works"
        url: "https://code.claude.com/docs/en/agent-sdk/agent-loop.md"
    boundary:
      - "내부 runtime 파일명이나 비공개 launch sequence는 공개판에서 단정하지 않는다."
      - "기술 스택은 공개 SDK 객체, cookbook 파일, 공식 문서로 확인되는 계층만 사용한다."
    practice:
      - "`00_The_one_liner_research_agent.ipynb`를 실행하고 흘러나오는 message type을 기록한다."
      - "`research_agent/agent.py`에서 `ClaudeAgentOptions`가 어떤 실행 조건을 만드는지 표시한다."

  - id: ch02
    part_id: part1
    number: "2장:"
    title: "도구 시스템 - 모델의 손이 되는 40개 이상의 도구"
    source_book: "docs/book-sdk-ko/src/part1/ch02.md"
    status: public-rewrite
    confidence: high
    rewrite: >
      이 장은 공개판에서 built-in tools, custom tools, MCP tools, tool search의 네 갈래로 나눈다. 공개 SDK 문서는 Read, Write, Edit, Bash, Glob, Grep, WebSearch 같은 built-in tools와 MCP/custom tools를 설명한다. cookbook은 tool choice, Pydantic tool schema, parallel tools, tool search embeddings로 도구 표면을 실습한다.

      원문의 도구 등록 파이프라인은 공개 SDK의 `allowed_tools`, `disallowed_tools`, `mcp_servers`, custom tools, permission evaluation으로 바꿔 설명한다. 많은 도구 문제는 tool search cookbook과 공식 tool search 문서로 연결한다.
    cookbook:
      - path: tool_use/tool_choice.ipynb
        title: "Tool choice notebook"
      - path: tool_use/tool_use_with_pydantic.ipynb
        title: "Tool use with Pydantic"
      - path: tool_use/tool_search_with_embeddings.ipynb
        title: "Tool search with embeddings"
      - path: tool_use/parallel_tools.ipynb
        title: "Parallel tools notebook"
    official_docs:
      - title: "Give Claude custom tools"
        url: "https://code.claude.com/docs/en/agent-sdk/custom-tools.md"
      - title: "Scale to many tools with tool search"
        url: "https://code.claude.com/docs/en/agent-sdk/tool-search.md"
      - title: "Tools reference"
        url: "https://code.claude.com/docs/en/tools-reference.md"
    boundary:
      - "비공개 도구 전체 목록처럼 보이는 내용은 게시하지 않는다."
      - "도구별 내부 prompt 원문은 공개 tool description 설계 원칙으로 바꾼다."
    practice:
      - "`tool_choice.ipynb`에서 tool forcing과 자유 선택 결과를 비교한다."
      - "`tool_search_with_embeddings.ipynb`를 기준으로 많은 도구를 한 번에 노출하지 않는 설계를 설명한다."

  - id: ch03
    part_id: part1
    number: "3장:"
    title: "에이전트 루프 - 사용자 입력에서 모델 응답까지의 전체 생명주기"
    source_book: "docs/book-sdk-ko/src/part1/ch03.md"
    status: public
    confidence: high
    rewrite: >
      공개판에서는 agent loop를 `query()` generator와 `ClaudeSDKClient`의 receive loop로 설명한다. 사용자의 prompt가 들어가고, assistant message가 tool call을 만들고, tool result가 다시 context에 들어가며, 마지막 result message가 run을 닫는다. 이 흐름은 `00` research notebook, `05` session browser, SRE agent notebook에서 반복적으로 관찰된다.

      내부 state enum을 복원하려 하지 않고, message stream과 notebook cell output으로 생명주기를 보여준다. 멀티턴 유지가 필요한 경우 `ClaudeSDKClient`, 일회성 작업은 `query()`로 설명한다.
    cookbook:
      - path: claude_agent_sdk/00_The_one_liner_research_agent.ipynb
        title: "Stateless query examples"
      - path: claude_agent_sdk/05_Building_a_session_browser.ipynb
        title: "Session browser"
      - path: claude_agent_sdk/utils/html_renderer.py
        title: "SDK message HTML renderer"
    official_docs:
      - title: "How the agent loop works"
        url: "https://code.claude.com/docs/en/agent-sdk/agent-loop.md"
      - title: "Stream responses in real-time"
        url: "https://code.claude.com/docs/en/agent-sdk/streaming-output.md"
      - title: "Streaming Input"
        url: "https://code.claude.com/docs/en/agent-sdk/streaming-vs-single-mode.md"
    boundary:
      - "내부 loop state 이름 대신 공개 message type과 stream event를 사용한다."
      - "모델의 숨은 사고 과정은 관측 대상이 아니다."
    practice:
      - "HTML renderer가 어떤 message block을 표시하는지 읽고 agent loop diagram을 그린다."
      - "`query()`와 `ClaudeSDKClient`를 같은 질문에 각각 적용해 상태 유지 차이를 확인한다."

  - id: ch04
    part_id: part1
    number: "4장:"
    title: "도구 실행 오케스트레이션 - 권한, 동시성, 스트리밍, 인터럽트"
    source_book: "docs/book-sdk-ko/src/part1/ch04.md"
    status: public-rewrite
    confidence: high
    rewrite: >
      원문의 실행 오케스트레이션은 공개판에서 permission modes, hooks, parallel tool calls, streaming output, MCP server boundaries로 나눈다. cookbook의 parallel tools와 SRE agent는 동시에 여러 관측 도구를 쓰거나 read-write 도구를 제한하는 패턴을 보여준다.

      인터럽트와 승인 흐름은 공식 user input/permissions 문서와 hooks 문서로 설명한다. 실행 권한을 내부 분류기로 설명하지 않고, `permission_mode`, `can_use_tool`, pre/post hooks, allowed/disallowed tool lists의 조합으로 번역한다.
    cookbook:
      - path: tool_use/parallel_tools.ipynb
        title: "Parallel tools"
      - path: claude_agent_sdk/03_The_site_reliability_agent.ipynb
        title: "Site reliability agent"
      - path: claude_agent_sdk/site_reliability_agent/sre_mcp_server.py
        title: "SRE MCP server implementation"
    official_docs:
      - title: "Configure permissions"
        url: "https://code.claude.com/docs/en/agent-sdk/permissions.md"
      - title: "Handle approvals and user input"
        url: "https://code.claude.com/docs/en/agent-sdk/user-input.md"
      - title: "Intercept and control agent behavior with hooks"
        url: "https://code.claude.com/docs/en/agent-sdk/hooks.md"
    boundary:
      - "내부 concurrency classifier가 아니라 도구의 의미론과 공개 권한 옵션으로 설명한다."
      - "실패/인터럽트는 SDK가 노출하는 error/result 흐름까지만 다룬다."
    practice:
      - "SRE MCP server에서 read-only와 write 도구를 분리해 권한 표를 만든다."
      - "parallel tools notebook에서 병렬 호출이 가능한 작업과 불가능한 작업을 구분한다."

  - id: ch04b
    part_id: part1
    number: "4b장:"
    title: "플랜 모드 - 뛰기 전에 살펴보기"
    source_book: "docs/book-sdk-ko/src/part1/ch04b.md"
    status: public
    confidence: high
    rewrite: >
      공개판에서 플랜 모드는 `permission_mode="plan"`과 승인 전 계획 수립 패턴으로 설명한다. chief-of-staff notebook은 실행 전에 전략적 계획을 만들고, 사용자가 승인한 뒤 실행 모드로 전환하는 흐름을 보여준다.

      플랜 모드는 내부 상태 머신보다 사용자 통제 지점으로 읽는 편이 안전하다. 계획은 실행 전 의도 정렬 문서이고, 실행은 권한 모드와 도구 허용 범위를 바꾼 별도 run으로 다룬다.
    cookbook:
      - path: claude_agent_sdk/01_The_chief_of_staff_agent.ipynb
        title: "Chief of staff plan mode section"
      - path: claude_agent_sdk/chief_of_staff_agent/agent.py
        title: "Chief of staff agent implementation"
      - path: managed_agents/CMA_gate_human_in_the_loop.ipynb
        title: "Managed Agents human-in-the-loop gate"
    official_docs:
      - title: "Configure permissions"
        url: "https://code.claude.com/docs/en/agent-sdk/permissions.md"
      - title: "Handle approvals and user input"
        url: "https://code.claude.com/docs/en/agent-sdk/user-input.md"
      - title: "Choose a permission mode"
        url: "https://code.claude.com/docs/en/permission-modes.md"
    boundary:
      - "내부 plan state 이름은 공개판에서 사용하지 않는다."
      - "실행 승인 UX는 각 호스트 앱의 구현 영역으로 둔다."
    practice:
      - "chief-of-staff notebook에서 plan mode cell과 실행 cell을 나누어 비교한다."
      - "계획 결과를 그대로 실행하지 말고 승인 체크리스트를 붙인다."

  - id: ch05
    part_id: part2
    number: "5장:"
    title: "시스템 프롬프트 아키텍처"
    source_book: "docs/book-sdk-ko/src/part2/ch05.md"
    status: public-rewrite
    confidence: medium
    rewrite: >
      공개판에서는 시스템 프롬프트를 내부 섹션명으로 설명하지 않는다. 대신 Agent SDK의 `system_prompt`, `claude_code` preset, `append`, `CLAUDE.md`, output styles, project settings로 나눈다. cookbook의 chief-of-staff agent는 `CLAUDE.md`와 output style을 실제 작업 디렉터리 설정으로 로드하는 예를 제공한다.

      중요한 메시지는 "프롬프트도 배포 가능한 설정"이라는 점이다. 공개 사이트에서는 우선순위와 조합 규칙을 문서화하되, 숨은 기본 프롬프트 원문을 재현하려 하지 않는다.
    cookbook:
      - path: claude_agent_sdk/01_The_chief_of_staff_agent.ipynb
        title: "Chief of staff prompt and output style examples"
      - path: claude_agent_sdk/chief_of_staff_agent/CLAUDE.md
        title: "Chief of staff CLAUDE.md"
      - path: skills/CLAUDE.md
        title: "Skills project instructions"
    official_docs:
      - title: "Modifying system prompts"
        url: "https://code.claude.com/docs/en/agent-sdk/modifying-system-prompts.md"
      - title: "Use Claude Code features in the SDK"
        url: "https://code.claude.com/docs/en/agent-sdk/claude-code-features.md"
      - title: "How Claude remembers your project"
        url: "https://code.claude.com/docs/en/memory.md"
    boundary:
      - "기본 시스템 프롬프트 원문이나 내부 boundary token은 게시하지 않는다."
      - "공개 옵션으로 재현 가능한 계층만 설명한다."
    practice:
      - "`setting_sources`를 바꿔 project 설정이 로드되는지 확인한다."
      - "`CLAUDE.md` 수정 전후로 같은 prompt의 tool use 차이를 기록한다."

  - id: ch06
    part_id: part2
    number: "6장:"
    title: "프롬프트를 통한 동작 제어"
    source_book: "docs/book-sdk-ko/src/part2/ch06.md"
    status: public
    confidence: high
    rewrite: >
      공개판에서는 행동 제어를 프롬프트 문체가 아니라 observable behavior로 평가한다. 도구 선호도, 질문/확인 빈도, 결과 형식, 실패 시 재시도 방식은 notebook 실행 로그와 결과물로 비교한다. chief-of-staff, tool choice, eval notebooks가 이 장의 근거다.

      좋은 지침은 모델의 행동을 과하게 묶는 문장이 아니라, 도구 선택과 산출물 검증이 쉬워지는 실행 계약이다. 그래서 각 패턴은 "어떤 tool call과 result 변화가 보이는가"로 평가한다.
    cookbook:
      - path: claude_agent_sdk/01_The_chief_of_staff_agent.ipynb
        title: "Behavior control with CLAUDE.md and output styles"
      - path: tool_use/tool_choice.ipynb
        title: "Tool choice behavior"
      - path: misc/building_evals.ipynb
        title: "Building evals"
      - path: misc/generate_test_cases.ipynb
        title: "Generate synthetic test cases"
    official_docs:
      - title: "Modifying system prompts"
        url: "https://code.claude.com/docs/en/agent-sdk/modifying-system-prompts.md"
      - title: "Get structured output from agents"
