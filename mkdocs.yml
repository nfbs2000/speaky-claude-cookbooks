          - "10장: 컴팩션 이후의 파일 상태 보존": book/part3/ch10.md
          - "11장: 마이크로 컴팩션 - 정밀한 컨텍스트 가지치기": book/part3/ch11.md
          - "12장: 토큰 예산 전략": book/part3/ch12.md
      - "제4부: 프롬프트 캐싱":
          - "13장: 캐시 아키텍처와 브레이크포인트 설계": book/part4/ch13.md
