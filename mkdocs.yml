          - "부록 E: 버전 진화 로그": book/appendix/appendix-e.md
          - "부록 F: 엔드투엔드 사례 추적": book/appendix/appendix-f.md
          - "부록 G: 인증 및 구독 시스템": book/appendix/appendix-g.md
          - "부록 H: 프롬프트 표면 인덱스": book/appendix/appendix-h.md
          - "부록 I: 강좌 플러그인 배포 청사진": book/appendix/appendix-i.md
  - 공개 투영:
      - 개요: projection/index.md
      - 전체 챕터 매핑: projection/chapter-map.md
      - 1부 아키텍처: projection/part1.md
      - 2부 프롬프트 엔지니어링: projection/part2.md
      - 3부 세션과 메시지 관측: projection/part3.md
      - 4부 프롬프트 캐싱: projection/part4.md
      - 5부 안전성과 권한: projection/part5.md
