site_name: Speaky Claude Cookbooks
site_description: Korean public projection of the Claude Agent SDK book onto executable Claude cookbook examples.
site_url: https://nfbs2000.github.io/speaky-claude-cookbooks/
repo_url: https://github.com/nfbs2000/speaky-claude-cookbooks
repo_name: nfbs2000/speaky-claude-cookbooks
edit_uri: edit/main/docs/

theme:
  name: material
  language: ko
  palette:
    - scheme: default
      primary: black
      accent: deep orange
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - en

extra_css:
  - assets/stylesheets/extra.css

nav:
  - 홈: index.md
  - 책 본문:
      - 전체 목차: book/index.md
      - "제1부: 아키텍처":
          - "1장: AI 코딩 에이전트의 전체 기술 스택": book/part1/ch01.md
          - "2장: 도구 시스템 - 모델의 손이 되는 40개 이상의 도구": book/part1/ch02.md
          - "3장: 에이전트 루프 - 사용자 입력에서 모델 응답까지의 전체 생명주기": book/part1/ch03.md
          - "4장: 도구 실행 오케스트레이션 - 권한, 동시성, 스트리밍, 인터럽트": book/part1/ch04.md
          - "4b장: 플랜 모드 - 뛰기 전에 살펴보기": book/part1/ch04b.md
      - "제2부: 프롬프트 엔지니어링":
          - "5장: 시스템 프롬프트 아키텍처": book/part2/ch05.md
          - "6장: 프롬프트를 통한 동작 제어": book/part2/ch06.md
          - "6b장: API 통신 계층 - 재시도, 스트리밍, 성능 저하 대응": book/part2/ch06b.md
          - "7장: 모델별 튜닝과 A/B 테스트": book/part2/ch07.md
          - "8장: 마이크로 하니스로서의 도구 프롬프트": book/part2/ch08.md
          - "8c장: 정적 시스템 프롬프트 - SDK에서 보이는 기본 성격": book/part2/ch08c.md
          - "8d장: 동적 프롬프트 레이어 - 세션, 메모리, 팀, MCP가 뒤에 붙는 법": book/part2/ch08d.md
          - "8e장: 도구 설명 프롬프트 - Bash, Read, Grep, Agent는 어떻게 행동을 유도하나": book/part2/ch08e.md
          - "8f장: 권한/분류기 프롬프트 - 자동 승인, CLAUDE.md prefix, deny 규칙의 숨은 제어 평면": book/part2/ch08f.md
      - "제3부: 세션과 메시지 관측":
